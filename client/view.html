<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Gift | Smart QR Gifting</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="page viewer-page">
    <section class="card viewer-card gift-reveal gift-spotlight" id="giftSpotlight">
      <h1 class="gift-success-title">Your surprise 🎁</h1>
      <p id="viewerStatus" class="status" aria-live="polite">Loading your gift...</p>

      <div class="media-spotlight-card">
        <video id="videoPlayer" class="gift-video hidden" controls playsinline preload="metadata"></video>
        <p id="giftMessage" class="gift-message"></p>
      </div>
      <div id="ar-section" class="ar-section">
        <button id="launch-ar-btn" class="ar-launch-btn">
          🎥 View in AR
        </button>

        <p class="ar-hint">
          Move your camera to a flat surface to place the gift
        </p>
      </div>

      <div id="ar-container" class="ar-container hidden"></div>
    </section>
  </main>
  <script src="js/config.js"></script>
  <script src="utils/themeResolver.js"></script>
  <script type="module" src="js/view.js"></script>
  <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
  <script src="/js/ar-viewer.js"></script>
</body>
</html>
